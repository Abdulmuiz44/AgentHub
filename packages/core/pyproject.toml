[project]
name = "agenthub-core"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.8.0", "agenthub-skills"]

[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["core"]


[tool.uv.sources]
agenthub-skills = { workspace = true }
